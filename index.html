      "name": "Scrapy5",

      "priceRange": "₹₹",

        "@type": "PostalAddress",
        "addressLocality": "Mumbai",
        "addressRegion": "MH",

      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "4"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",

      },
      "sameAs": [
        "https://www.instagram.com/scrapy5_/"

    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Scrapy5",
      "url": "https://www.scrapy5.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.scrapy5.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
